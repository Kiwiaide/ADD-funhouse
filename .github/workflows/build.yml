name: Build Executables

on:
  push:
    paths:
      - 'tools/**'
  workflow_dispatch:
    inputs:
      tool_name:
        description: 'Tool script name (without .py), or "all" to build everything'
        required: false
        default: 'all'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      tools: ${{ steps.find.outputs.tools }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: find
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.tool_name }}"
            if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
              TOOLS=$(ls tools/*.py 2>/dev/null | xargs -I{} basename {} .py | jq -R . | jq -sc .)
            else
              TOOLS="[\"$INPUT\"]"
            fi
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'tools/*.py' 2>/dev/null || ls tools/*.py 2>/dev/null)
            TOOLS=$(echo "$CHANGED" | grep '\.py$' | xargs -I{} basename {} .py | jq -R . | jq -sc .)
          fi
          [ "$TOOLS" = "[]" ] && TOOLS='["_none_"]'
          echo "tools=$TOOLS" >> "$GITHUB_OUTPUT"
          echo "Will build: $TOOLS"

  build:
    needs: detect-changes
    if: ${{ !contains(needs.detect-changes.outputs.tools, '_none_') }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        tool: ${{ fromJson(needs.detect-changes.outputs.tools) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f tools/requirements.txt ]; then
            pip install -r tools/requirements.txt
          fi
          if [ -f "tools/${{ matrix.tool }}/requirements.txt" ]; then
            pip install -r "tools/${{ matrix.tool }}/requirements.txt"
          fi
        shell: bash

      - name: Build
        run: |
          cd tools
          pyinstaller --onefile --windowed --name "${{ matrix.tool }}" "${{ matrix.tool }}.py"
        shell: bash

      - name: Rename artifact
        run: |
          cd tools/dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            SUFFIX="windows.exe"
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            SUFFIX="macos"
          else
            SUFFIX="linux"
          fi
          for f in *; do
            BASE="${f%.*}"
            EXT="${f##*.}"
            if [ "$f" = "$BASE" ]; then
              mv "$f" "${{ matrix.tool }}-${SUFFIX}"
            else
              mv "$f" "${{ matrix.tool }}-${SUFFIX}"
            fi
          done
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.tool }}-${{ matrix.os }}
          path: tools/dist/*

  release:
    needs: [detect-changes, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find all-artifacts -type f | while read f; do
            cp "$f" "release/$(basename "$f")"
          done
          ls -la release/

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="latest"
          TITLE="Latest Builds ($(date -u +%Y-%m-%d))"
          BODY="Auto-built from commit ${{ github.sha }}"

          # Delete existing release if present
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin --delete "$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$BODY" \
            --prerelease \
            release/*
